name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            bundles: app
            artifact: stream-hub-macos
            files: src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows
            os: windows-latest
            bundles: nsis,msi
            artifact: stream-hub-windows
            files: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set replace-registry-host always

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }} --ci

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ARCH=$(uname -m)
          mkdir -p src-tauri/target/release/bundle/dmg
          hdiutil create \
            -volname "Stream Hub" \
            -srcfolder "src-tauri/target/release/bundle/macos/Stream Hub.app" \
            -ov \
            -format UDZO \
            "src-tauri/target/release/bundle/dmg/Stream.Hub_${VERSION}_${ARCH}.dmg"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        run: |
          mapfile -d '' ASSETS < <(find release-assets -type f -print0)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --title "Stream Hub $RELEASE_TAG" \
              --notes "macOS and Windows installers generated by GitHub Actions."
          fi
