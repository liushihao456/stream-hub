name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            bundles: dmg
            artifact: stream-hub-macos
            files: src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows
            os: windows-latest
            bundles: nsis,msi
            artifact: stream-hub-windows
            files: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install macOS libmpv
        if: runner.os == 'macOS'
        run: brew install mpv

      - name: Install Windows libmpv
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $mpvDir = Join-Path $env:RUNNER_TEMP "libmpv"
          New-Item -ItemType Directory -Force -Path $mpvDir | Out-Null

          $release = Invoke-RestMethod "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $asset = $release.assets |
            Where-Object { $_.name -match '^mpv-dev-lgpl-x86_64-\d+.*\.7z$' } |
            Select-Object -First 1

          if (-not $asset) {
            throw "Could not find a zhongfly libmpv development archive."
          }

          $archive = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive
          7z x $archive "-o$mpvDir" -y

          $dll = Join-Path $mpvDir "libmpv-2.dll"
          if (-not (Test-Path $dll)) {
            throw "libmpv-2.dll was not found in the downloaded archive."
          }

          $exports = & dumpbin /exports $dll |
            Select-String '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(mpv_.+)$' |
            ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() }

          if (-not $exports) {
            throw "Could not read libmpv exports from libmpv-2.dll."
          }

          $def = Join-Path $mpvDir "mpv.def"
          $lib = Join-Path $mpvDir "mpv.lib"
          @("LIBRARY libmpv-2.dll", "EXPORTS") + $exports | Set-Content -Path $def -Encoding ASCII
          & lib /def:$def /name:libmpv-2.dll /out:$lib /machine:x64

          "LIB=$mpvDir;$env:LIB" >> $env:GITHUB_ENV
          $mpvDir >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }} --ci

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/**/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/**/* \
              --title "Stream Hub $RELEASE_TAG" \
              --notes "macOS and Windows installers generated by GitHub Actions." \
              --target "$GITHUB_SHA"
          fi
