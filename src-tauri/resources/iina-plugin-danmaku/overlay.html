<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Hub Danmaku</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .comment {
        position: absolute;
        right: -24rem;
        white-space: nowrap;
        color: rgba(255, 255, 255, 0.98);
        font-size: 32px;
        font-weight: 700;
        line-height: 1.15;
        text-shadow:
          -2px 0 rgba(0, 0, 0, 0.92),
          0 2px rgba(0, 0, 0, 0.92),
          2px 0 rgba(0, 0, 0, 0.92),
          0 -2px rgba(0, 0, 0, 0.92),
          0 8px 20px rgba(0, 0, 0, 0.45);
        animation: scroll-left 8.8s linear forwards;
      }

      @keyframes scroll-left {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(calc(-100vw - 48rem));
        }
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script>
      const stage = document.getElementById("stage");
      const lanes = 10;
      const laneHeight = 42;

      let ws = null;
      let activeKey = "";

      function stopDanmaku() {
        if (ws) {
          ws.close();
          ws = null;
        }
        activeKey = "";
        stage.innerHTML = "";
      }

      function showComment(text) {
        const comment = document.createElement("div");
        comment.className = "comment";
        comment.textContent = text;
        comment.style.top = `${Math.floor(Math.random() * lanes) * laneHeight + 18}px`;
        stage.appendChild(comment);
        comment.addEventListener("animationend", () => comment.remove(), { once: true });
      }

      function handleDanmakuEvent(raw) {
        let event;
        try {
          event = JSON.parse(raw);
        } catch {
          return;
        }

        if (event.method !== "sendDM" || !Array.isArray(event.dms)) {
          return;
        }

        event.dms.forEach(item => {
          const text = String(item.text || "").trim();
          if (text) {
            showComment(text);
          }
        });
      }

      function startDanmaku(roomID, platform, port) {
        const nextKey = `${platform || ""}:${roomID || ""}`;
        if (!roomID || nextKey === activeKey) {
          return;
        }

        stopDanmaku();
        activeKey = nextKey;
        ws = new WebSocket(
          `ws://127.0.0.1:${port}/danmaku-websocket?roomId=${encodeURIComponent(roomID)}&platform=${encodeURIComponent(platform || "")}`,
        );

        ws.addEventListener("message", event => {
          handleDanmakuEvent(event.data);
        });

        ws.addEventListener("close", () => {
          if (activeKey === nextKey) {
            const reconnectKey = activeKey;
            stopDanmaku();
            if (reconnectKey) {
              setTimeout(() => startDanmaku(roomID, platform, port), 1500);
            }
          }
        });

        ws.addEventListener("error", () => {
          stopDanmaku();
        });
      }

      iina.onMessage("configure", payload => {
        startDanmaku(String(payload.roomID || ""), String(payload.platform || ""), Number(payload.port || 19080));
      });

      iina.onMessage("stop", () => {
        stopDanmaku();
      });

      iina.postMessage("ready", {});
    </script>
  </body>
</html>
